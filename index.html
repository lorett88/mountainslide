<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mountain Slide — Sistem Operasional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============ TOKEN DESAIN — identitas Mountain Slide (alpine) ============ */
:root{
  --ink:#173A2E;        /* pine tua — sidebar */
  --ink-2:#1F4C3B;
  --pine:#1E7A4D;       /* hijau utama */
  --pine-bright:#2FA968;
  --sunset:#E76F2C;     /* aksen energi / seluncur */
  --sunset-soft:#FCE7D7;
  --pos:#1E9E63;        /* uang masuk / positif */
  --pos-soft:#E1F3E9;
  --neg:#E04B43;        /* uang keluar / negatif */
  --neg-soft:#FBE3E1;
  --gold:#C98A1E;
  --canvas:#EFF3F0;     /* stone putih dingin */
  --card:#FFFFFF;
  --text:#19302A;
  --muted:#5F7268;
  --muted-2:#86968E;
  --line:#DCE6E0;
  --line-2:#EAF0EC;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 1px 2px rgba(16,40,30,.05), 0 8px 24px rgba(16,40,30,.06);
  --shadow-lg:0 24px 60px rgba(16,40,30,.18);
  --font:'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  background:var(--canvas);
  color:var(--text);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
button{font-family:inherit}
a{color:var(--pine)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#C7D4CD;border-radius:8px;border:2px solid var(--canvas)}

/* ============ LOGIN ============ */
.login{
  min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr;
}
.login-hero{
  position:relative;background:linear-gradient(160deg,#11362A 0%,#1C5840 55%,#247650 100%);
  color:#fff;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:48px;
}
.login-hero .brandline{display:flex;align-items:center;gap:12px;font-weight:800;font-size:18px;letter-spacing:.2px;z-index:2}
.login-hero h1{font-size:40px;line-height:1.05;margin:0 0 14px;font-weight:800;letter-spacing:-.5px;z-index:2;max-width:11ch}
.login-hero p{color:#CFE6D9;max-width:34ch;margin:0;z-index:2}
.login-hero .feat{display:flex;flex-direction:column;gap:10px;z-index:2;margin-top:8px}
.login-hero .feat span{display:flex;gap:10px;align-items:center;color:#DCEFE5;font-size:14px}
.login-hero .feat svg{flex:none;color:var(--sunset)}
.hero-svg{position:absolute;inset:0;width:100%;height:100%;z-index:1;opacity:.9}
.login-form-wrap{display:flex;align-items:center;justify-content:center;padding:40px}
.login-card{width:100%;max-width:380px}
.login-card .eyebrow{color:var(--sunset);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
.login-card h2{font-size:26px;margin:6px 0 4px;font-weight:800}
.login-card .sub{color:var(--muted);margin:0 0 26px;font-size:14px}
.mode-chip{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;margin-bottom:22px}
.mode-chip.local{background:var(--sunset-soft);color:#B6531A}
.mode-chip.online{background:var(--pos-soft);color:#157046}
.mode-chip .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.demo-accounts{margin-top:18px;border:1px dashed var(--line);border-radius:var(--radius-sm);padding:0;overflow:hidden}
.demo-accounts summary{cursor:pointer;padding:11px 14px;font-size:13px;font-weight:600;color:var(--muted);list-style:none}
.demo-accounts summary::-webkit-details-marker{display:none}
.demo-accounts .da-body{padding:4px 14px 14px;display:grid;gap:7px}
.demo-accounts .da-row{display:flex;justify-content:space-between;font-size:12.5px;background:var(--line-2);padding:7px 10px;border-radius:8px;cursor:pointer}
.demo-accounts .da-row:hover{background:var(--pos-soft)}
.demo-accounts code{font-weight:700;color:var(--text)}

/* ============ FIELD / BUTTON ============ */
.field{margin-bottom:16px}
.label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.label .req{color:var(--neg)}
.input,.select,.textarea{
  width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:var(--radius-sm);
  font-family:inherit;font-size:14.5px;color:var(--text);background:#fff;transition:border-color .15s, box-shadow .15s;
}
.textarea{resize:vertical;min-height:72px}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 3px var(--pos-soft)}
.input::placeholder,.textarea::placeholder{color:var(--muted-2)}
.input.tnum{font-variant-numeric:tabular-nums}
.hintline{font-size:12px;color:var(--muted);margin-top:6px}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 18px;border-radius:var(--radius-sm);border:1.5px solid transparent;
  font-weight:600;font-size:14.5px;cursor:pointer;transition:filter .15s, background .15s, border-color .15s;white-space:nowrap;
}
.btn svg{flex:none}
.btn-primary{background:var(--pine);color:#fff}
.btn-primary:hover{filter:brightness(1.07)}
.btn-accent{background:var(--sunset);color:#fff}
.btn-accent:hover{filter:brightness(1.05)}
.btn-ghost{background:#fff;border-color:var(--line);color:var(--text)}
.btn-ghost:hover{border-color:var(--pine);color:var(--pine)}
.btn-subtle{background:var(--line-2);color:var(--text)}
.btn-subtle:hover{background:#E0EAE3}
.btn-danger{background:#fff;border-color:var(--neg-soft);color:var(--neg)}
.btn-danger:hover{background:var(--neg-soft)}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn-block{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed;filter:none}

/* ============ SHELL ============ */
.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{background:var(--ink);color:#CFE0D7;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);position:relative}
.sidebar-brand .b-top{display:flex;align-items:center;gap:11px}
.sidebar-brand .b-name{font-weight:800;color:#fff;font-size:16px;letter-spacing:.2px;line-height:1.1}
.sidebar-brand .b-sub{font-size:11px;color:#7FA593;margin-top:2px;letter-spacing:.04em}
.slope-line{margin-top:14px;height:3px;width:100%;border-radius:2px;background:linear-gradient(90deg,var(--sunset),transparent)}
.nav{flex:1;padding:12px 12px;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;
  color:#B7CDC1;font-weight:600;font-size:14px;cursor:pointer;margin-bottom:3px;transition:background .14s,color .14s;
}
.nav-item svg{flex:none;opacity:.85}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--pine);color:#fff}
.nav-item.active svg{opacity:1}
.sidebar-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08)}
.user-card{display:flex;align-items:center;gap:11px;padding:8px 6px;border-radius:10px}
.avatar{width:38px;height:38px;border-radius:10px;background:var(--ink-2);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:15px;flex:none}
.user-card .u-name{color:#fff;font-weight:700;font-size:13.5px;line-height:1.1}
.user-card .u-role{font-size:11px;color:#85AB99;text-transform:capitalize}
.sidebar-foot .btn{margin-top:8px;background:rgba(255,255,255,.06);color:#CFE0D7;border:none}
.sidebar-foot .btn:hover{background:rgba(255,255,255,.12)}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{display:none;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--ink);color:#fff;position:sticky;top:0;z-index:30}
.topbar .b-name{font-weight:800;font-size:15px}
.hamb{background:rgba(255,255,255,.08);border:none;color:#fff;width:40px;height:40px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.content{padding:28px 30px;max-width:1180px;width:100%;margin:0 auto}

.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-head h1{font-size:24px;font-weight:800;margin:0 0 3px;letter-spacing:-.3px}
.page-head .ph-sub{color:var(--muted);font-size:14px;margin:0}
.page-head .ph-actions{display:flex;gap:10px;flex-wrap:wrap}

/* ============ CARD / GRID / STAT ============ */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:20px}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line-2)}
.card-head h3{margin:0;font-size:15.5px;font-weight:700}
.card-head .ch-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.grid{display:grid;gap:16px}
.g-2{grid-template-columns:repeat(2,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-4{grid-template-columns:repeat(4,1fr)}
.mb{margin-bottom:16px}
.mb-lg{margin-bottom:22px}

.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat .s-label{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:600}
.stat .s-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.stat .s-val{font-size:25px;font-weight:800;margin-top:12px;letter-spacing:-.4px;font-variant-numeric:tabular-nums}
.stat .s-foot{font-size:12.5px;color:var(--muted);margin-top:4px}
.ic-pine{background:var(--pos-soft);color:var(--pine)}
.ic-sun{background:var(--sunset-soft);color:var(--sunset)}
.ic-pos{background:var(--pos-soft);color:var(--pos)}
.ic-neg{background:var(--neg-soft);color:var(--neg)}
.ic-gold{background:#F6ECD4;color:var(--gold)}

/* money flow bar (signature) */
.flowbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;background:linear-gradient(120deg,#16382B,#1F5440);color:#fff;border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow)}
.flowbar .acc-label{font-size:12.5px;color:#A9CEBC;font-weight:600;display:flex;align-items:center;gap:7px}
.flowbar .acc-val{font-size:27px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums;letter-spacing:-.4px}
.flowbar .acc-foot{font-size:11.5px;color:#8FB6A4;margin-top:2px}
.flowbar .arrow{display:flex;flex-direction:column;align-items:center;color:#9DD0B6;gap:2px}
.flowbar .arrow small{font-size:10px;color:#7FB199}

/* ============ TABLE ============ */
.table-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:14px}
table.tbl th{text-align:left;font-weight:600;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
table.tbl td{padding:12px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tbody tr:hover{background:#FAFCFB}
table.tbl td.num,table.tbl th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.t-actions{display:flex;gap:6px;justify-content:flex-end}
.iconbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);transition:.14s}
.iconbtn:hover{color:var(--pine);border-color:var(--pine)}
.iconbtn.del:hover{color:var(--neg);border-color:var(--neg-soft);background:var(--neg-soft)}

.money{font-variant-numeric:tabular-nums;font-weight:600}
.pos{color:var(--pos)}
.neg{color:var(--neg)}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.strong{font-weight:700}

.badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.badge-tiket{background:var(--pos-soft);color:var(--pine)}
.badge-video{background:#EAE6F6;color:#6A4FB0}
.badge-tunai{background:#EAF0EC;color:#46685A}
.badge-qris{background:#E5EEF6;color:#2E6896}
.badge-pos{background:var(--pos-soft);color:var(--pos)}
.badge-warn{background:var(--sunset-soft);color:#B6531A}
.badge-neg{background:var(--neg-soft);color:var(--neg)}
.badge-grey{background:var(--line-2);color:var(--muted)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:8px;background:var(--line-2);font-size:12.5px;font-weight:600;color:var(--text)}

.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty .e-ic{width:54px;height:54px;border-radius:14px;background:var(--line-2);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--muted-2)}
.empty h4{margin:0 0 5px;color:var(--text);font-size:16px;font-weight:700}
.empty p{margin:0 auto 16px;max-width:36ch;font-size:13.5px}

/* segmented control */
.seg{display:inline-flex;background:var(--line-2);border-radius:10px;padding:3px;gap:3px}
.seg button{border:none;background:transparent;padding:7px 14px;border-radius:7px;font-weight:600;font-size:13.5px;color:var(--muted);cursor:pointer;transition:.14s}
.seg button.on{background:#fff;color:var(--pine);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* filter bar */
.filterbar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.filterbar .field{margin-bottom:0}
.filterbar .input,.filterbar .select{padding:9px 11px;font-size:14px}

/* chart bars */
.barchart{display:grid;gap:11px}
.bar-row{display:grid;grid-template-columns:130px 1fr auto;align-items:center;gap:12px}
.bar-row .b-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{height:24px;background:var(--line-2);border-radius:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:7px;transition:width .5s ease}
.bar-row .b-val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;min-width:96px}

/* ============ MODAL ============ */
.modal-bg{position:fixed;inset:0;background:rgba(16,40,30,.46);backdrop-filter:blur(2px);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:34px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:18px;width:100%;max-width:520px;box-shadow:var(--shadow-lg);animation:pop .18s ease}
.modal.wide{max-width:780px}
@keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--line-2)}
.modal-head h3{margin:0;font-size:18px;font-weight:800}
.modal-head .mh-sub{font-size:13px;color:var(--muted);margin-top:2px}
.modal-body{padding:22px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px;border-top:1px solid var(--line-2);background:#FAFCFB;border-radius:0 0 18px 18px}
.x-btn{width:34px;height:34px;border-radius:9px;border:none;background:var(--line-2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.x-btn:hover{background:#E0EAE3;color:var(--text)}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.form-grid .full{grid-column:1 / -1}

/* upload */
.uploader{border:1.5px dashed var(--line);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;transition:.15s;background:#FAFCFB}
.uploader:hover{border-color:var(--pine);background:var(--pos-soft)}
.uploader.has{padding:0;border-style:solid;overflow:hidden}
.uploader img{width:100%;display:block;max-height:220px;object-fit:contain;background:#0d1f18}
.up-label{font-size:13px;color:var(--muted);font-weight:600}
.proof-thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid var(--line);cursor:pointer;background:#0d1f18}

/* toast */
.toast-wrap{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:10px;z-index:200}
.toast{background:var(--ink);color:#fff;padding:13px 17px;border-radius:11px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;animation:slidein .22s ease;max-width:340px}
.toast.ok{background:#15633F}
.toast.err{background:#B8362F}
.toast svg{flex:none}
@keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

.split-help{background:var(--line-2);border-radius:var(--radius-sm);padding:13px 15px;font-size:13px;color:var(--muted);line-height:1.6}
.split-help b{color:var(--text)}

.kpi-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
.kpi-line:last-child{border-bottom:none}
.kpi-line .k-l{color:var(--muted)}
.kpi-line .k-v{font-weight:700;font-variant-numeric:tabular-nums}
.kpi-line.big{padding:12px 0}
.kpi-line.big .k-l{font-weight:700;color:var(--text)}
.kpi-line.big .k-v{font-size:18px}

/* responsive */
@media(max-width:960px){
  .g-4{grid-template-columns:repeat(2,1fr)}
  .g-3{grid-template-columns:1fr}
  .g-2{grid-template-columns:1fr}
  .login{grid-template-columns:1fr}
  .login-hero{display:none}
}
@media(max-width:820px){
  .shell{grid-template-columns:1fr}
  .topbar{display:flex}
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:60;width:264px;transform:translateX(-100%);transition:transform .22s ease}
  .sidebar.open{transform:none}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55;display:none}
  .scrim.show{display:block}
  .content{padding:18px 16px}
  .flowbar{grid-template-columns:1fr;gap:14px;text-align:center}
  .flowbar .arrow{transform:rotate(90deg)}
  .form-grid{grid-template-columns:1fr}
  .bar-row{grid-template-columns:100px 1fr;}
  .bar-row .b-val{grid-column:2;text-align:left;min-width:0}
  .g-4{grid-template-columns:1fr 1fr}
}
@media(max-width:520px){
  .page-head h1{font-size:20px}
  .stat .s-val{font-size:21px}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="modal-root"></div>
<div class="toast-wrap" id="toast-root"></div>

<script>
/* =================================================================
   MOUNTAIN SLIDE — Sistem Operasional
   Single-file app. Dua mode data:
   - Mode Lokal (localStorage)  -> langsung jalan, untuk uji coba / 1 perangkat
   - Mode Online (Supabase)     -> multi-user, login asli, data terpusat
   ================================================================= */

/* ---------- Konstanta ---------- */
const ROLES = { owner:'Owner', manager:'Manager', spv:'Supervisor', staff:'Staff' };
const TABLES = ['profiles','rev_categories','exp_categories','revenues','expenses','mutations','settlements','settlement_payments','assets','employees','attendances','payrolls','settings'];
const LS_DB = 'ms_db_v1';
const LS_SESSION = 'ms_session_v1';
const LS_CONN = 'ms_conn_v1';
const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const MONTHS_FULL = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

/* ---------- Ikon (SVG stroke) ---------- */
const ICON = {
  dashboard:'<path d="M3 13h8V3H3v10Zm10 8h8V3h-8v18ZM3 21h8v-6H3v6Z"/>',
  revenue:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
  expense:'<path d="M3 6h18M3 12h18M3 18h12"/>',
  cash:'<rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/>',
  share:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5 8.6 10.5"/>',

const $ = (s,el)=> (el||document).querySelector(s);
const uid = ()=> 'id_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function rp(n){ n=Number(n)||0; return 'Rp '+ new Intl.NumberFormat('id-ID').format(Math.round(n)); }
function rpShort(n){ n=Number(n)||0; const a=Math.abs(n); if(a>=1e9) return 'Rp '+(n/1e9).toFixed(1).replace('.',',')+' M'; if(a>=1e6) return 'Rp '+(n/1e6).toFixed(1).replace('.',',')+' jt'; if(a>=1e3) return 'Rp '+Math.round(n/1e3)+' rb'; return rp(n); }
function num(v){ return Number(String(v).replace(/[^\d-]/g,''))||0; }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDate(s){ if(!s) return '-'; const p=String(s).slice(0,10).split('-'); if(p.length<3) return s; return Number(p[2])+' '+MONTHS[Number(p[1])-1]+' '+p[0]; }
function fmtDateTime(s){ if(!s) return '-'; const d=new Date(s); if(isNaN(d)) return fmtDate(s); return fmtDate(s)+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function monthRange(year, mIdx){ const start=year+'-'+String(mIdx+1).padStart(2,'0')+'-01'; const last=new Date(year,mIdx+1,0).getDate(); const end=year+'-'+String(mIdx+1).padStart(2,'0')+'-'+String(last).padStart(2,'0'); return {start,end}; }
function halfRange(year, mIdx, half){ const last=new Date(year,mIdx+1,0).getDate(); const mm=String(mIdx+1).padStart(2,'0'); if(half===1) return {start:year+'-'+mm+'-01', end:year+'-'+mm+'-15', label:'1–15 '+MONTHS[mIdx]+' '+year}; return {start:year+'-'+mm+'-16', end:year+'-'+mm+'-'+String(last).padStart(2,'0'), label:'16–'+last+' '+MONTHS[mIdx]+' '+year}; }
function inRange(d, start, end){ const x=String(d).slice(0,10); return x>=start && x<=end; }
function sum(arr, f){ return arr.reduce((a,b)=> a+(f?f(b):b), 0); }
function initials(name){ if(!name) return '?'; const p=name.trim().split(/\s+/); return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase(); }

/* resize gambar bukti agar hemat penyimpanan */
function fileToResizedDataURL(file, maxW){ maxW=maxW||1000; return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height; if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; } const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); res(c.toDataURL('image/jpeg',0.72)); }; img.onerror=rej; img.src=r.result; }; r.onerror=rej; r.readAsDataURL(file); }); }

function toast(msg, kind){ const el=document.createElement('div'); el.className='toast '+(kind||''); const ic= kind==='ok'?'check':kind==='err'?'close':'info'; el.innerHTML=icon(ic,18)+'<span>'+esc(msg)+'</span>'; $('#toast-root').appendChild(el); setTimeout(()=>{ el.style.transition='opacity .3s,transform .3s'; el.style.opacity='0'; el.style.transform='translateX(20px)'; setTimeout(()=>el.remove(),300); }, 2600); }

   LAPISAN DATA — antarmuka seragam (Promise based)
   ============================================================ */
const DB = {
  mode:'local',         // 'local' | 'online'
  sb:null,              // supabase client (online)

  async init(){
    const conn = loadConn();
    if(conn && conn.url && conn.key){
      try{ await this._initSupabase(conn.url, conn.key); this.mode='online'; return; }
      catch(e){ console.warn('Supabase gagal, fallback ke lokal', e); }
    }
    this.mode='local';
    ensureLocalSeed();
  },

  async _initSupabase(url, key){
    if(!window.supabase){ await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'); }
    this.sb = window.supabase.createClient(url, key);
    // tes koneksi sederhana
    const { error } = await this.sb.from('settings').select('id').limit(1);
    if(error) throw error;
  },

  /* ---- auth ---- */
  async signIn(username, password){
    username=(username||'').trim().toLowerCase();
    if(this.mode==='online'){
      const email = username.includes('@') ? username : username+'@mountainslide.app';
      const { data, error } = await this.sb.auth.signInWithPassword({ email, password });
      if(error) throw new Error('Username atau password salah.');
      const { data:prof } = await this.sb.from('profiles').select('*').eq('id', data.user.id).single();
      if(!prof) throw new Error('Profil pengguna tidak ditemukan.');
      if(prof.active===false) throw new Error('Akun ini dinonaktifkan.');
      return prof;
    } else {
      const db=loadLocal(); const u=(db.profiles||[]).find(p=> (p.username||'').toLowerCase()===username);
      if(!u || u.password!==password) throw new Error('Username atau password salah.');
      if(u.active===false) throw new Error('Akun ini dinonaktifkan.');
      const sess={ id:u.id, username:u.username, full_name:u.full_name, role:u.role };
      localStorage.setItem(LS_SESSION, JSON.stringify(sess));
      return sess;
    }
  },
  async signOut(){
    if(this.mode==='online'){ await this.sb.auth.signOut(); }
    localStorage.removeItem(LS_SESSION);
  },
  async currentUser(){
    if(this.mode==='online'){
      const { data } = await this.sb.auth.getUser();
      if(!data || !data.user) return null;
      const { data:prof } = await this.sb.from('profiles').select('*').eq('id', data.user.id).single();
      return prof || null;
    } else {
      const s=localStorage.getItem(LS_SESSION); if(!s) return null;
      try{ const sess=JSON.parse(s); const db=loadLocal(); const u=(db.profiles||[]).find(p=>p.id===sess.id); return u||sess; }catch(e){ return null; }
    }
  },

  /* ---- CRUD generik (ambil semua lalu filter di klien — volume kecil) ---- */
  async all(table){
    if(this.mode==='online'){ const { data, error } = await this.sb.from(table).select('*'); if(error) throw error; return data||[]; }
    return (loadLocal()[table]||[]).slice();
  },
  async insert(table, row){
    row = Object.assign({}, row);
    if(this.mode==='online'){ const { data, error } = await this.sb.from(table).insert(row).select().single(); if(error) throw error; return data; }
    const db=loadLocal(); if(!row.id) row.id=uid(); if(!row.created_at) row.created_at=new Date().toISOString(); (db[table]=db[table]||[]).push(row); saveLocal(db); return row;
  },
  async update(table, id, patch){
    if(this.mode==='online'){ const { data, error } = await this.sb.from(table).update(patch).eq('id', id).select().single(); if(error) throw error; return data; }
    const db=loadLocal(); const i=(db[table]||[]).findIndex(r=>r.id===id); if(i>-1){ db[table][i]=Object.assign({}, db[table][i], patch); saveLocal(db); return db[table][i]; } return null;
  },
  async remove(table, id){
    if(this.mode==='online'){ const { error } = await this.sb.from(table).delete().eq('id', id); if(error) throw error; return; }
    const db=loadLocal(); db[table]=(db[table]||[]).filter(r=>r.id!==id); saveLocal(db);
  },
  async getSettings(){
    const rows = await this.all('settings');
    return rows[0] || DEFAULT_SETTINGS();
  },
  async saveSettings(patch){
    const rows = await this.all('settings');
    if(rows[0]) return this.update('settings', rows[0].id, patch);
    return this.insert('settings', Object.assign(DEFAULT_SETTINGS(), patch, {id:'app'}));
  }
};

function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=()=>rej(new Error('Gagal memuat '+src)); document.head.appendChild(s); }); }

/* ============================================================
   PERHITUNGAN SALDO
   Kas      = saldo_awal + Σ pendapatan tunai − Σ pengeluaran − Σ setoran + Σ penggantian
   Rekening = saldo_awal + Σ pendapatan qris  + Σ setoran − Σ penggantian − Σ transfer bagi hasil keluar
   ============================================================ */
async function computeBalances(){
  const [revs, exps, muts, pays, settings] = await Promise.all([
    DB.all('revenues'), DB.all('expenses'), DB.all('mutations'), DB.all('settlement_payments'), DB.getSettings()
  ]);
  const revTunai = sum(revs.filter(r=>r.metode==='tunai'), r=>r.amount);
  const revQris  = sum(revs.filter(r=>r.metode==='qris'), r=>r.amount);
  const totExp   = sum(exps, e=>e.amount);
  const setoran  = sum(muts.filter(m=>m.jenis==='setoran'), m=>m.amount);
  const ganti    = sum(muts.filter(m=>m.jenis==='penggantian'), m=>m.amount);
  const transferOut = sum(pays, p=>p.amount);
  const kas = (settings.saldo_awal_kas||0) + revTunai - totExp - setoran + ganti;
  const rekening = (settings.saldo_awal_rekening||0) + revQris + setoran - ganti - transferOut;
  return { kas, rekening, revTunai, revQris, totExp, setoran, ganti, transferOut };
}

function closeDrawer(){ const s=$('#sidebar'); if(s) s.classList.remove('open'); const sc=$('#scrim'); if(sc) sc.classList.remove('show'); }

function renderPage(key){
  const c=$('#content'); if(!c) return;
  c.innerHTML='<div class="empty"><div class="e-ic">'+icon('info',24)+'</div><p>Memuat…</p></div>';
  const map={ dashboard:pageDashboard, pendapatan:pagePendapatan, pengeluaran:pagePengeluaran, kas:pageKas, bagihasil:pageBagiHasil, karyawan:pageKaryawan, absensi:pageAbsensi, gaji:pageGaji, aset:pageAset, laporan:pageLaporan, pengaturan:pagePengaturan };

}
function accessDenied(){ return '<div class="empty"><div class="e-ic">'+icon('user',24)+'</div><h4>Akses ditolak</h4><p>Halaman ini tidak tersedia untuk peran Anda.</p></div>'; }

async function pageDashboard(c){
  const now=new Date(); const {start,end}=monthRange(now.getFullYear(), now.getMonth());

  const mExps=exps.filter(e=>inRange(e.tanggal,start,end));
  const totRev=sum(mRevs,r=>r.amount), totExp=sum(mExps,e=>e.amount);

  if(State.user.role==='staff'){
    c.innerHTML = pageHead('Halo, '+(State.user.full_name||State.user.username).split(' ')[0]+' 👋','Tugas Anda: mencatat pendapatan harian.','')
      +'<div class="card"><div class="card-pad" style="text-align:center;padding:42px 20px">'
        +'<div style="width:62px;height:62px;border-radius:16px;background:var(--pos-soft);color:var(--pine);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">'+icon('revenue',28)+'</div>'
        +'<h3 style="margin:0 0 6px;font-size:18px">Catat Pendapatan Hari Ini</h3>'
        +'<p class="muted" style="max-width:38ch;margin:0 auto 18px">Isi jumlah tiket &amp; video yang terjual, lalu simpan. '+fmtDate(todayStr())+'</p>'
        +'<button class="btn btn-accent" data-goto="pendapatan">'+icon('plus',18)+' Buka Form Pendapatan</button>'
      +'</div></div>';
    c.querySelectorAll('[data-goto]').forEach(b=> b.addEventListener('click', ()=>{ State.page=b.dataset.goto; renderApp(); }));
    return;
  }

  if(State.user.role==='spv'){
    const tStart=todayStr();
    const todayExp=exps.filter(e=>e.tanggal===tStart);
    const yr=String(new Date().getFullYear()); const yearExp=exps.filter(e=>String(e.tanggal).slice(0,4)===yr);
    c.innerHTML = pageHead('Halo, '+(State.user.full_name||State.user.username).split(' ')[0]+' 👋','Catat pengeluaran operasional. '+fmtDate(tStart),
        '<button class="btn btn-ghost" data-goto="absensi">'+icon('calendar',16)+' Input Absensi</button><button class="btn btn-accent" id="quick-exp">'+icon('plus',18)+' Catat Pengeluaran</button>')
      +'<div class="grid g-3 mb-lg">'
        + stat('Pengeluaran bulan ini','ic-neg','expense', rp(totExp), mExps.length+' transaksi')
        + stat('Pengeluaran hari ini','ic-sun','receipt', rp(sum(todayExp,e=>e.amount)), todayExp.length+' transaksi')
        + stat('Pengeluaran tahun '+yr,'ic-gold','report', rp(sum(yearExp,e=>e.amount)), yearExp.length+' transaksi')
      +'</div>'
      +'<div class="card"><div class="card-head"><h3>Pengeluaran terbaru bulan ini</h3><button class="btn btn-sm btn-subtle" data-goto="pengeluaran">Lihat semua</button></div>'+ expMiniTable(mExps) +'</div>';
    const qe=$('#quick-exp'); if(qe) qe.addEventListener('click', openExpenseModalQuick);
    c.querySelectorAll('[data-goto]').forEach(b=> b.addEventListener('click', ()=>{ State.page=b.dataset.goto; renderApp(); }));
    return;
  }

  // manager / owner
  const bal=await computeBalances();
  const byCat={}; mRevs.forEach(r=>{ const cat=map[r.kategori_id]; const k=cat?cat.name:'Lainnya'; byCat[k]=(byCat[k]||0)+r.amount; });
  const expByCat={}; mExps.forEach(e=>{ expByCat[e.kategori]=(expByCat[e.kategori]||0)+e.amount; });
  const net=totRev-totExp;

  c.innerHTML = pageHead('Dasbor','Ringkasan operasional • '+periodeLbl,
      (isOwner()? '<button class="btn btn-ghost" id="q-exp">'+icon('plus',16)+' Pengeluaran</button><button class="btn btn-accent" id="q-rev">'+icon('plus',18)+' Pendapatan</button>' : State.user.role==='manager'? '<button class="btn btn-accent" data-goto="bagihasil">'+icon('plus',16)+' Bagi Hasil</button>' : ''))
    +'<div class="flowbar mb-lg">'
      +'<div><div class="acc-label">'+icon('cash',15)+' Saldo Kas (tunai)</div><div class="acc-val">'+rp(bal.kas)+'</div><div class="acc-foot">Uang fisik di tangan</div></div>'
      +'<div class="arrow">'+icon('arrowdown',22)+'<small>setor / ganti</small></div>'
      +'<div><div class="acc-label">'+icon('wallet',15)+' Saldo Rekening</div><div class="acc-val">'+rp(bal.rekening)+'</div><div class="acc-foot">Saldo di bank</div></div>'
    +'</div>'
    +'<div class="grid g-3 mb-lg">'
      + stat('Pendapatan bulan ini','ic-pos','revenue', rp(totRev), mRevs.length+' transaksi')
      + stat('Pengeluaran bulan ini','ic-neg','expense', rp(totExp), mExps.length+' transaksi')
      + stat('Laba kotor bulan ini','ic-gold','report', rp(net), net>=0?'Pendapatan − Pengeluaran':'Defisit')
    +'</div>'

      +'<div class="card"><div class="card-head"><h3>Pendapatan per kategori</h3><span class="pill">'+periodeLbl+'</span></div><div class="card-pad">'+barChart(byCat, totRev, 'pine')+'</div></div>'
      +'<div class="card"><div class="card-head"><h3>Pengeluaran per kategori</h3><span class="pill">'+periodeLbl+'</span></div><div class="card-pad">'+barChart(expByCat, totExp, 'neg')+'</div></div>'
    +'</div>'
    +'<div class="card"><div class="card-head"><h3>Aktivitas terbaru</h3><button class="btn btn-sm btn-subtle" data-go="laporan">Lihat laporan</button></div>'+recentActivity(revs,exps,map)+'</div>';

  const a=$('#q-rev'); if(a) a.addEventListener('click', ()=>openRevenueModal(cats, null));
  const b=$('#q-exp'); if(b) b.addEventListener('click', openExpenseModalQuick);
  const g=c.querySelector('[data-go]'); if(g) g.addEventListener('click', ()=>{ State.page='laporan'; renderApp(); });
  c.querySelectorAll('[data-goto]').forEach(b=> b.addEventListener('click', ()=>{ State.page=b.dataset.goto; renderApp(); }));
}
function stat(label, icClass, ic, val, foot){
  return '<div class="stat"><div class="s-label"><span class="s-icon '+icClass+'">'+icon(ic,18)+'</span>'+esc(label)+'</div><div class="s-val">'+val+'</div><div class="s-foot">'+esc(foot||'')+'</div></div>';
}
function barChart(obj, total, color){
  const entries=Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  if(entries.length===0 || total===0) return '<div class="empty" style="padding:24px"><p>Belum ada data periode ini.</p></div>';
  const max=Math.max.apply(null, entries.map(e=>e[1]));
  const col = color==='neg'? 'var(--neg)' : color==='gold'? 'var(--gold)' : 'var(--pine)';
  return '<div class="barchart">'+entries.map(([k,v])=>{
    const pct = max>0? Math.max(4,(v/max)*100) : 0;
    return '<div class="bar-row"><div class="b-name">'+esc(k)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div><div class="b-val">'+rp(v)+'</div></div>';
  }).join('')+'</div>';
}
function expMiniTable(list){
  const l=list.slice().sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||'')).slice(0,10);
  if(l.length===0) return emptyState('expense','Belum ada pengeluaran','Catat pengeluaran operasional lewat tombol di atas.');
  return '<div class="table-wrap"><table class="tbl"><thead><tr><th>Tanggal</th><th>Kategori</th><th>Deskripsi</th><th class="num">Nominal</th></tr></thead><tbody>'
    + l.map(e=>'<tr><td>'+fmtDate(e.tanggal)+'</td><td><span class="badge badge-grey">'+esc(e.kategori)+'</span></td><td>'+esc(e.deskripsi||'\u2014')+'</td><td class="num strong neg">\u2212'+rp(e.amount)+'</td></tr>').join('')
    +'</tbody></table></div>';
}
function recentActivity(revs,exps,map){
  const items=[];
  revs.forEach(r=> items.push({ t:r.created_at||r.tanggal, type:'rev', d:r }));
  exps.forEach(e=> items.push({ t:e.created_at||e.tanggal, type:'exp', d:e }));
  items.sort((a,b)=> new Date(b.t)-new Date(a.t));
  const top=items.slice(0,8);
  if(top.length===0) return '<div class="empty" style="padding:30px"><p>Belum ada aktivitas.</p></div>';
  return '<div class="table-wrap"><table class="tbl"><thead><tr><th>Tanggal</th><th>Jenis</th><th>Keterangan</th><th class="num">Nilai</th></tr></thead><tbody>'
    + top.map(it=>{
      if(it.type==='rev'){ const cat=map[it.d.kategori_id]; return '<tr><td>'+fmtDate(it.d.tanggal)+'</td><td><span class="badge badge-pos">Masuk</span></td><td>'+esc(cat?cat.name:'Pendapatan')+' · '+(it.d.metode==='qris'?'QRIS':'Tunai')+(it.d.qty?' · '+it.d.qty+' tiket':'')+'</td><td class="num pos">+'+rp(it.d.amount)+'</td></tr>'; }
      return '<tr><td>'+fmtDate(it.d.tanggal)+'</td><td><span class="badge badge-neg">Keluar</span></td><td>'+esc(it.d.kategori)+(it.d.deskripsi?' · '+esc(it.d.deskripsi):'')+'</td><td class="num neg">−'+rp(it.d.amount)+'</td></tr>';
    }).join('')
    +'</tbody></table></div>';
}

async function pagePendapatan(c){
  const {cats,map}=await revCatMap();
  // STAFF / SPV: hanya form input (tanpa riwayat)
  if(State.user.role==='staff' || State.user.role==='spv'){
    c.innerHTML = pageHead('Catat Pendapatan','Isi jumlah terjual per kategori, lalu simpan. '+fmtDate(todayStr()),'')
      + revInputCard(cats);
    bindRevInput(cats);
    return;
  }
  // MANAGER: kelola harga & kategori tiket
  if(State.user.role==='manager'){
    c.innerHTML = pageHead('Harga & Kategori Tiket','Atur harga jual tiap kategori (otomatis dipakai saat staff/SPV input)',
        '<button class="btn btn-accent" id="add-cat">'+icon('plus',18)+' Tambah Kategori</button>')
      +'<div class="split-help mb-lg">'+icon('info',16)+' &nbsp;Harga di sini langsung dipakai saat staff mengisi jumlah tiket. Anda bisa menambah kategori baru seperti "Tiket Hari Besar".</div>'
      +'<div class="card"><div class="card-head"><h3>Daftar kategori &amp; harga</h3></div><div id="cat-list"></div></div>';
    $('#add-cat').addEventListener('click', ()=>openRevCatModal(null));
    drawRevCatPrices(cats);
    return;
  }
  // OWNER: input + atur harga + riwayat
  const revs=(await DB.all('revenues')).sort((a,b)=> (b.tanggal||'').localeCompare(a.tanggal||'') || (b.created_at||'').localeCompare(a.created_at||''));
  const now=new Date(); const def=monthRange(now.getFullYear(), now.getMonth());
  State.cache.revFilter = State.cache.revFilter || { start:def.start, end:def.end, kat:'', metode:'' };
  c.innerHTML = pageHead('Pendapatan','Riwayat & pencatatan pemasukan tiket dan video',
      '<button class="btn btn-ghost" id="atur-harga">'+icon('settings',16)+' Atur Harga</button><button class="btn btn-accent" id="add-rev">'+icon('plus',18)+' Catat Pendapatan</button>')
    + filterCard('rev', cats)
    + '<div class="card" style="margin-top:16px"><div class="card-head"><h3 id="rev-count"></h3><button class="btn btn-sm btn-subtle" id="rev-csv">'+icon('download',15)+' Ekspor CSV</button></div><div id="rev-list"></div></div>';
  $('#atur-harga').addEventListener('click', ()=> openHargaModal(cats));
  $('#add-rev').addEventListener('click', ()=> openRevInputModal(cats));
  bindFilter('rev', cats, ()=>drawRevList(revs,map));
  $('#rev-csv').addEventListener('click', ()=> exportRevCSV(filterRevs(revs), map));
  drawRevList(revs,map);
}
function filterRevs(revs){ const f=State.cache.revFilter; return revs.filter(r=> inRange(r.tanggal,f.start,f.end) && (!f.kat||r.kategori_id===f.kat) && (!f.metode||r.metode===f.metode) ); }
function drawRevList(revs,map){
  const list=filterRevs(revs);
  const total=sum(list,r=>r.amount), qty=sum(list,r=>r.qty||0);
  $('#rev-count').innerHTML = list.length+' transaksi · <span class="pos">'+rp(total)+'</span> · '+qty+' tiket';
  $('#rev-list').innerHTML = revTable(list, map, true);
  bindRevRowActions(revs,map);
}
function revTable(list, map, withActions){
  if(list.length===0) return emptyState('revenue','Belum ada pendapatan','Catat transaksi pertama lewat tombol Catat Pendapatan.');
  return '<div class="table-wrap"><table class="tbl"><thead><tr><th>Tanggal</th><th>Kategori</th><th>Bayar</th><th class="num">Qty</th><th class="num">Nominal</th><th>Oleh</th>'+(withActions?'<th></th>':'')+'</tr></thead><tbody>'
    + list.map(r=>{ const cat=map[r.kategori_id]; const isVid=cat&&cat.type==='video';
      return '<tr><td>'+fmtDate(r.tanggal)+'</td>'
        +'<td><span class="badge '+(isVid?'badge-video':'badge-tiket')+'">'+esc(cat?cat.name:'?')+'</span></td>'
        +'<td><span class="badge '+(r.metode==='qris'?'badge-qris':'badge-tunai')+'">'+(r.metode==='qris'?'QRIS':'Tunai')+'</span></td>'
        +'<td class="num">'+(r.qty||'—')+'</td>'
        +'<td class="num strong">'+rp(r.amount)+'</td>'
        +'<td class="muted small">'+esc(r.created_by_name||'')+'</td>'
        +(withActions?'<td class="num"><div class="t-actions"><button class="iconbtn" data-edit-rev="'+r.id+'">'+icon('edit',15)+'</button><button class="iconbtn del" data-del-rev="'+r.id+'">'+icon('trash',15)+'</button></div></td>':'')
        +'</tr>';
    }).join('')+'</tbody></table></div>';
}
function bindRevRowActions(revs,map){
  document.querySelectorAll('[data-edit-rev]').forEach(b=> b.addEventListener('click', async ()=>{ const cats=(await revCatMap()).cats; openRevenueModal(cats, revs.find(r=>r.id===b.dataset.editRev)); }));
  document.querySelectorAll('[data-del-rev]').forEach(b=> b.addEventListener('click', ()=> confirmDelete('Hapus pendapatan ini?', async ()=>{ await DB.remove('revenues', b.dataset.delRev); toast('Pendapatan dihapus','ok'); renderPage('pendapatan'); })));
}

function openRevenueModal(cats, row){
  const isEdit=!!row;
  const opts = cats.map(c=> '<option value="'+c.id+'" '+(row&&row.kategori_id===c.id?'selected':'')+'>'+esc(c.name)+' ('+(c.type==='video'?'Video':'Tiket')+')</option>').join('');
  openModal({
    title: isEdit?'Edit Pendapatan':'Catat Pendapatan',
    sub: isEdit?'Perbarui data transaksi':'Masukkan pemasukan tiket atau video',
    body:
      '<div class="form-grid">'
      +'<div class="field full"><label class="label">Kategori <span class="req">*</span></label><select class="select" id="r-kat">'+opts+'</select></div>'
      +'<div class="field"><label class="label">Tanggal <span class="req">*</span></label><input class="input" type="date" id="r-tgl" value="'+(row?row.tanggal:todayStr())+'"></div>'
      +'<div class="field"><label class="label">Jumlah tiket (qty)</label><input class="input tnum" id="r-qty" inputmode="numeric" placeholder="0" value="'+(row&&row.qty?row.qty:'')+'"><div class="hintline">Kosongkan untuk pendapatan video</div></div>'
      +'<div class="field"><label class="label">Nominal (Rp) <span class="req">*</span></label><input class="input tnum" id="r-amt" inputmode="numeric" placeholder="0" value="'+(row?row.amount:'')+'"></div>'
      +'<div class="field"><label class="label">Metode bayar <span class="req">*</span></label><select class="select" id="r-metode"><option value="tunai" '+(row&&row.metode==='tunai'?'selected':'')+'>Tunai → Kas</option><option value="qris" '+(row&&row.metode==='qris'?'selected':'')+'>QRIS → Rekening</option></select></div>'
      +'<div class="field full"><label class="label">Catatan</label><input class="input" id="r-note" placeholder="opsional" value="'+esc(row?row.catatan||'':'')+'"></div>'
      +'</div>',
    okText: isEdit?'Simpan Perubahan':'Simpan',
    onOk: async ()=>{
      const amount=num($('#r-amt').value);
      if(amount<=0){ toast('Nominal harus diisi','err'); return false; }
      const data={ tanggal:$('#r-tgl').value, kategori_id:$('#r-kat').value, qty:num($('#r-qty').value)||null, amount, metode:$('#r-metode').value, catatan:$('#r-note').value.trim() };
      if(isEdit){ await DB.update('revenues', row.id, data); toast('Pendapatan diperbarui','ok'); }
      else { data.created_by=State.user.id; data.created_by_name=State.user.full_name||State.user.username; await DB.insert('revenues', data); toast('Pendapatan tersimpan','ok'); }
      renderPage(State.page); return true;
    }
  });
  attachThousand('r-amt');
}

function bindRevInput(cats){
  let metode='tunai';
  document.querySelectorAll('#ri-metode button').forEach(b=> b.addEventListener('click', ()=>{ document.querySelectorAll('#ri-metode button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); metode=b.dataset.m; }));
  const recalc=()=>{ let tot=0; document.querySelectorAll('.rev-qty').forEach(inp=>{ const q=num(inp.value); const h=Number(inp.dataset.harga)||0; const s=q*h; tot+=s; const sb=document.querySelector('.rev-sub[data-cat="'+inp.dataset.cat+'"]'); if(sb) sb.textContent=rp(s); }); const t=$('#ri-total'); if(t) t.textContent=rp(tot); };
  document.querySelectorAll('.rev-qty').forEach(inp=> inp.addEventListener('input', ()=>{ inp.value=inp.value.replace(/[^\d]/g,''); recalc(); }));
  const save=$('#ri-save'); if(save) save.addEventListener('click', async ()=>{
    const tgl=$('#ri-tgl').value; const note=$('#ri-note').value.trim();
    const entries=[]; document.querySelectorAll('.rev-qty').forEach(inp=>{ const q=num(inp.value); if(q>0){ const h=Number(inp.dataset.harga)||0; entries.push({ kategori_id:inp.dataset.cat, qty:q, amount:q*h }); } });
    if(entries.length===0){ toast('Isi minimal satu jumlah','err'); return; }
    save.disabled=true; save.textContent='Menyimpan\u2026';
    for(const e of entries){ await DB.insert('revenues', { tanggal:tgl, kategori_id:e.kategori_id, qty:e.qty, amount:e.amount, metode, catatan:note, created_by:State.user.id, created_by_name:State.user.full_name||State.user.username }); }
    toast('Laporan pendapatan tersimpan ('+entries.length+' kategori)','ok');
    $('#modal-root').innerHTML=''; renderPage('pendapatan');
  });
  recalc();
}

async function openBagiHasilCalc(settings){
  const now=new Date();
  const {cats}=await revCatMap();
  const ticketCats=cats.filter(c=> c.type==='tiket' && c.sharing!==false);
  // build modal: pilih bulan + periode
  const monthOpts=MONTHS_FULL.map((m,i)=>'<option value="'+i+'" '+(i===now.getMonth()?'selected':'')+'>'+m+'</option>').join('');
  const yearOpts=[now.getFullYear()-1, now.getFullYear()].map(y=>'<option value="'+y+'" '+(y===now.getFullYear()?'selected':'')+'>'+y+'</option>').join('');
  openModal({
    wide:true, title:'Hitung Bagi Hasil', sub:'Pilih periode lalu sesuaikan nominal per tiket',
    body:'<div class="filterbar mb" style="margin-bottom:18px">'
      +'<div class="field"><label class="label">Bulan</label><select class="select" id="bh-month">'+monthOpts+'</select></div>'
      +'<div class="field"><label class="label">Tahun</label><select class="select" id="bh-year">'+yearOpts+'</select></div>'
      +'<div class="field"><label class="label">Periode closing</label><div class="seg" id="bh-half"><button class="on" data-h="1">Tgl 1–15</button><button data-h="2">Tgl 16–akhir</button></div></div>'
      +'<button class="btn btn-primary btn-sm" id="bh-load">Tarik data</button>'
    +'</div>'
    +'<div id="bh-calc"></div>',
    okText:'Simpan Bagi Hasil', okDisabled:true,
    onOk: async ()=>{
      const snap=window.__bhSnap; if(!snap){ toast('Tarik data dulu','err'); return false; }
      await DB.insert('settlements', snap); toast('Bagi hasil tersimpan','ok'); renderPage('bagihasil'); return true;
    }
  });
  let half=1;
  document.querySelectorAll('#bh-half button').forEach(btn=> btn.addEventListener('click', ()=>{ document.querySelectorAll('#bh-half button').forEach(x=>x.classList.remove('on')); btn.classList.add('on'); half=Number(btn.dataset.h); }));
  $('#bh-load').addEventListener('click', async ()=>{
    const y=Number($('#bh-year').value), m=Number($('#bh-month').value);
    const rng=halfRange(y,m,half);
    const revs=await DB.all('revenues');
    const rows=ticketCats.map(cat=>{ const rs=revs.filter(r=>r.kategori_id===cat.id && inRange(r.tanggal,rng.start,rng.end)); return { id:cat.id, name:cat.name, qty:sum(rs,r=>r.qty||0), pendapatan:sum(rs,r=>r.amount), nominal:cat.nominal||0 }; });
    renderBhTable(rows, rng, settings);
  });
}
function renderBhTable(rows, rng, settings){
  const cont=$('#bh-calc');
  cont.innerHTML =
    '<div class="card mb" style="box-shadow:none;border-color:var(--line)"><div class="card-head"><h3>'+esc(rng.label)+'</h3><span class="pill">Tiket dengan bagi hasil</span></div>'
    +'<div class="table-wrap"><table class="tbl"><thead><tr><th>Kategori</th><th class="num">Qty</th><th class="num">Nominal/tiket</th><th class="num">Nilai tiket</th><th class="num">Pendapatan</th></tr></thead><tbody id="bh-rows">'
    + rows.map(r=> '<tr data-id="'+r.id+'"><td>'+esc(r.name)+'</td><td class="num">'+r.qty+'</td>'
        +'<td class="num"><input class="input tnum bh-nom" data-id="'+r.id+'" style="width:120px;padding:7px 9px;text-align:right" inputmode="numeric" value="'+(r.nominal||0)+'"></td>'
        +'<td class="num bh-nilai">'+rp(r.qty*(r.nominal||0))+'</td>'
        +'<td class="num strong">'+rp(r.pendapatan)+'</td></tr>').join('')
    +'</tbody></table></div></div>'
    +'<div class="grid g-2">'
      +'<div class="card card-pad" style="box-shadow:none;border-color:var(--line)">'
        +'<div class="field" style="margin-bottom:12px"><label class="label">Persentase Pengelola (%)</label><input class="input tnum" id="bh-pp" inputmode="decimal" value="'+settings.pct_pengelola+'" style="width:120px"></div>'
        +'<div class="field" style="margin-bottom:0"><label class="label">Persentase Negara (%)</label><input class="input tnum" id="bh-pn" inputmode="decimal" value="'+settings.pct_negara+'" style="width:120px"></div>'
      +'</div>'
      +'<div class="card card-pad" id="bh-summary" style="box-shadow:none;border-color:var(--line)"></div>'
    +'</div>';
  const recalc=()=>{
    let totPend=0, totNilai=0;
    rows.forEach(r=>{ const inp=cont.querySelector('.bh-nom[data-id="'+r.id+'"]'); r.nominal=num(inp.value); const nilai=r.qty*r.nominal; totPend+=r.pendapatan; totNilai+=nilai; const cell=inp.closest('tr').querySelector('.bh-nilai'); cell.textContent=rp(nilai); });
    const pp=parseFloat($('#bh-pp').value)||0, pn=parseFloat($('#bh-pn').value)||0;
    const net=totPend-totNilai; const aPeng=net*pp/100, aNeg=net*pn/100; const sisa=net-aPeng-aNeg;
    $('#bh-summary').innerHTML =
      '<div class="kpi-line"><span class="k-l">Total pendapatan tiket</span><span class="k-v">'+rp(totPend)+'</span></div>'
      +'<div class="kpi-line"><span class="k-l">Total nilai tiket</span><span class="k-v">−'+rp(totNilai)+'</span></div>'
      +'<div class="kpi-line big"><span class="k-l">Dasar bagi hasil</span><span class="k-v">'+rp(net)+'</span></div>'
      +'<div class="kpi-line"><span class="k-l">Pengelola ('+pp+'%)</span><span class="k-v pos">'+rp(aPeng)+'</span></div>'
      +'<div class="kpi-line"><span class="k-l">Negara ('+pn+'%)</span><span class="k-v" style="color:var(--gold)">'+rp(aNeg)+'</span></div>'
      +'<div class="kpi-line"><span class="k-l">Sisa (operasional pengelola)</span><span class="k-v muted">'+rp(sisa)+'</span></div>';
    // snapshot utk disimpan
    window.__bhSnap = {
      jenis:'tiket', periode_label:rng.label, start:rng.start, end:rng.end,
      breakdown: rows.map(r=>({ name:r.name, qty:r.qty, nominal:r.nominal, nilai_tiket:r.qty*r.nominal, pendapatan:r.pendapatan })),
      total_pendapatan:totPend, total_nilai_tiket:totNilai, net,
      pct_pengelola:pp, pct_negara:pn, amount_pengelola:aPeng, amount_negara:aNeg, sisa,
      created_by:State.user.id, created_by_name:State.user.full_name||State.user.username
    };
    const ok=document.querySelector('#modal-ok'); if(ok) ok.disabled = totPend<=0;
  };
  cont.querySelectorAll('.bh-nom').forEach(i=> i.addEventListener('input', recalc));
  $('#bh-pp').addEventListener('input', recalc); $('#bh-pn').addEventListener('input', recalc);
  recalc();
}

  const mo=MONTHS_FULL.map((mm,i)=>'<option value="'+i+'" '+(i===m?'selected':'')+'>'+mm+'</option>').join('');
  const yo=[y-1,y,y+1].map(yy=>'<option value="'+yy+'" '+(yy===y?'selected':'')+'>'+yy+'</option>').join('');
  return '<select class="select" id="'+prefix+'-m" style="width:auto;padding:8px 11px">'+mo+'</select> <select class="select" id="'+prefix+'-y" style="width:auto;padding:8px 11px">'+yo+'</select>';
}
function bindMonthYear(prefix, cb){ const m=$('#'+prefix+'-m'), y=$('#'+prefix+'-y'); const fire=()=>cb(Number(y.value), Number(m.value)); if(m) m.addEventListener('change',fire); if(y) y.addEventListener('change',fire); }

async function pageAbsensi(c){

  const now=new Date();
  State.cache.absDate = State.cache.absDate || todayStr();
  State.cache.absMonth = State.cache.absMonth || {y:now.getFullYear(), m:now.getMonth()};
  c.innerHTML = pageHead('Absensi','Input kehadiran harian oleh manajer','')
    + '<div class="card mb-lg"><div class="card-head"><h3>Input absensi harian</h3><div class="ch-actions"><input class="input" type="date" id="abs-date" value="'+State.cache.absDate+'" style="width:auto;padding:8px 11px"></div></div><div id="abs-input"></div></div>'
    + '<div class="card"><div class="card-head"><h3>Rekap bulanan</h3><div class="ch-actions">'+ymSelect('absm', State.cache.absMonth.y, State.cache.absMonth.m)+'</div></div><div id="abs-recap"></div></div>';
  if(emps.length===0){ $('#abs-input').innerHTML=emptyState('user','Belum ada karyawan aktif','Tambahkan karyawan dulu di menu Karyawan, lalu absensinya bisa diinput di sini.'); $('#abs-recap').innerHTML=''; return; }

async function drawAbsInput(emps){
  const date=State.cache.absDate;
  const all=await DB.all('attendances');
  const existing={}; all.filter(a=>a.tanggal===date).forEach(a=> existing[a.employee_id]=a);
  const el=$('#abs-input');
  el.innerHTML='<div class="card-pad"><div class="muted small" style="margin-bottom:8px">Tanggal: <b>'+fmtDate(date)+'</b> \u2014 pilih status tiap karyawan lalu simpan.</div>'
    + emps.map(e=>{ const cur=existing[e.id]? existing[e.id].status : 'hadir';
      return '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-2);flex-wrap:wrap"><div><b>'+esc(e.nama)+'</b> <span class="muted small">'+esc(e.jabatan||'')+'</span></div>'
        +'<div class="seg abs-seg" data-emp="'+e.id+'" style="flex-wrap:wrap">'+ABSEN.map(a=>'<button data-st="'+a.k+'" class="'+(a.k===cur?'on':'')+'">'+a.l+'</button>').join('')+'</div></div>';
    }).join('')
    +'<div style="margin-top:16px"><button class="btn btn-accent" id="abs-save">'+icon('check',16)+' Simpan absensi '+fmtDate(date)+'</button></div></div>';
  el.querySelectorAll('.abs-seg').forEach(seg=> seg.querySelectorAll('button').forEach(b=> b.addEventListener('click', ()=>{ seg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); })));
  $('#abs-save').addEventListener('click', async ()=>{
    const btn=$('#abs-save'); btn.disabled=true; btn.textContent='Menyimpan\u2026';
    const all2=await DB.all('attendances'); const exist2={}; all2.filter(a=>a.tanggal===date).forEach(a=> exist2[a.employee_id]=a);
    for(const e of emps){ const seg=el.querySelector('.abs-seg[data-emp="'+e.id+'"]'); const on=seg.querySelector('button.on'); const status=on? on.dataset.st : 'hadir';
      if(exist2[e.id]){ await DB.update('attendances', exist2[e.id].id, {status}); }
      else { await DB.insert('attendances', { employee_id:e.id, tanggal:date, status, created_by:State.user.id, created_by_name:State.user.full_name||State.user.username }); }
    }
    toast('Absensi '+fmtDate(date)+' tersimpan','ok'); drawAbsRecap(emps); btn.disabled=false; btn.innerHTML=icon('check',16)+' Simpan absensi '+fmtDate(date);
  });
}
async function drawAbsRecap(emps){
  const y=State.cache.absMonth.y, m=State.cache.absMonth.m; const last=new Date(y,m+1,0).getDate(); const mm=String(m+1).padStart(2,'0');
  const all=await DB.all('attendances'); const map={}; all.forEach(a=>{ map[a.employee_id+'|'+a.tanggal]=a.status; });
  const days=[]; for(let d=1; d<=last; d++) days.push(d);
  let head='<table class="tbl" style="min-width:'+(180+last*28)+'px"><thead><tr><th style="position:sticky;left:0;background:#fff;z-index:2">Karyawan</th>'+days.map(d=>'<th class="num" style="padding:8px 3px">'+d+'</th>').join('')+'<th class="num">Hari kerja</th></tr></thead><tbody>';
  let body=emps.map(e=>{ let work=0;
    const cells=days.map(d=>{ const dd=y+'-'+mm+'-'+String(d).padStart(2,'0'); const st=map[e.id+'|'+dd]; if(!st) return '<td class="num" style="padding:6px 3px;color:var(--muted-2)">\u00B7</td>'; const inf=absenInfo(st); work+=inf.w; return '<td class="num" style="padding:6px 3px;font-weight:700;color:'+inf.col+'" title="'+inf.l+'">'+inf.s+'</td>'; }).join('');
    return '<tr><td style="position:sticky;left:0;background:#fff;font-weight:600">'+esc(e.nama)+'</td>'+cells+'<td class="num strong">'+fmtDays(work)+'</td></tr>';
  }).join('');
  $('#abs-recap').innerHTML = '<div style="overflow-x:auto">'+head+body+'</tbody></table></div><div class="card-pad muted small">Keterangan: '+ABSEN.map(a=>'<b>'+a.s+'</b>='+a.l).join(' \u00B7 ')+' \u00B7 (\u00B7) belum diisi. Klik tanggal di atas untuk mengubah.</div>';
}

async function openGajiCalc(){
  const now=new Date();
  const emps=(await DB.all('employees')).filter(e=>e.active!==false);
  const monthOpts=MONTHS_FULL.map((m,i)=>'<option value="'+i+'" '+(i===now.getMonth()?'selected':'')+'>'+m+'</option>').join('');

    onOk: async ()=>{ const snap=window.__gajiSnap; if(!snap){ toast('Tarik data dulu','err'); return false; } await DB.insert('payrolls', snap); toast('Perhitungan gaji tersimpan','ok'); renderPage('gaji'); return true; }
  });
  let mode='28';
  document.querySelectorAll('#g-mode button').forEach(b=> b.addEventListener('click', ()=>{ document.querySelectorAll('#g-mode button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); mode=b.dataset.md; }));
  $('#g-load').addEventListener('click', async ()=>{
    const y=Number($('#g-year').value), m=Number($('#g-month').value); let rng;

    else { const pm=m===0?11:m-1, py=m===0?y-1:y; rng={ start:py+'-'+String(pm+1).padStart(2,'0')+'-28', end:y+'-'+String(m+1).padStart(2,'0')+'-27', label:'Gaji 28 '+MONTHS[m]+' '+y }; }
    const att=await DB.all('attendances');
    const rows=emps.map(e=>{ const days=sum(att.filter(a=>a.employee_id===e.id && inRange(a.tanggal,rng.start,rng.end)), a=> absenInfo(a.status).w); return { id:e.id, nama:e.nama, jabatan:e.jabatan||'', hari_kerja:days, rate:e.nominal_harian||0 }; });

function renderGajiTable(rows, rng){
  const cont=$('#g-calc');
  cont.innerHTML='<div class="card mb" style="box-shadow:none;border-color:var(--line)"><div class="card-head"><h3>'+esc(rng.label)+'</h3><span class="pill">'+fmtDate(rng.start)+' \u2013 '+fmtDate(rng.end)+'</span></div>'
    +'<div class="table-wrap"><table class="tbl"><thead><tr><th>Karyawan</th><th>Jabatan</th><th class="num">Hari kerja</th><th class="num">Upah/hari</th><th class="num">Total</th></tr></thead><tbody>'
    + (rows.length? rows.map(r=>'<tr data-id="'+r.id+'"><td><b>'+esc(r.nama)+'</b></td><td class="muted small">'+esc(r.jabatan)+'</td><td class="num">'+fmtDays(r.hari_kerja)+'</td>'
      +'<td class="num"><input class="input tnum g-rate" data-id="'+r.id+'" style="width:130px;padding:7px 9px;text-align:right" inputmode="numeric" value="'+(r.rate||0)+'"></td>'
      +'<td class="num strong g-total">'+rp(r.hari_kerja*(r.rate||0))+'</td></tr>').join('') : '<tr><td colspan="5" class="muted" style="text-align:center;padding:20px">Tidak ada karyawan aktif.</td></tr>')
    +'</tbody></table></div></div>'
    +'<div class="card card-pad" id="g-summary" style="box-shadow:none;border-color:var(--line)"></div>';

    $('#g-summary').innerHTML='<div class="kpi-line"><span class="k-l">Jumlah karyawan</span><span class="k-v">'+rows.length+'</span></div>'
      +'<div class="kpi-line"><span class="k-l">Total hari kerja</span><span class="k-v">'+fmtDays(totDays)+'</span></div>'
      +'<div class="kpi-line big"><span class="k-l">Total upah dibayarkan</span><span class="k-v">'+rp(tot)+'</span></div>';
    window.__gajiSnap = { periode_label:rng.label, start:rng.start, end:rng.end, breakdown: rows.map(r=>({ employee_id:r.id, nama:r.nama, jabatan:r.jabatan, hari_kerja:r.hari_kerja, rate:r.rate, total:r.hari_kerja*r.rate })), total:tot, created_by:State.user.id, created_by_name:State.user.full_name||State.user.username };
    const ok=$('#modal-ok'); if(ok) ok.disabled = rows.length===0;

async function pageLaporan(c){
  const {cats,map}=await revCatMap();
  const [revs, exps] = await Promise.all([DB.all('revenues'), DB.all('expenses')]);
  const now=new Date(); const def=monthRange(now.getFullYear(), now.getMonth());
  State.cache.repFilter = State.cache.repFilter || { start:def.start, end:def.end };
  c.innerHTML = pageHead('Laporan','Ringkasan pendapatan & pengeluaran per periode dan kategori','')
    +'<div class="card mb-lg"><div class="card-pad"><div class="filterbar">'
      +'<div class="field"><label class="label">Dari</label><input class="input" type="date" id="rp-start" value="'+State.cache.repFilter.start+'"></div>'
      +'<div class="field"><label class="label">Sampai</label><input class="input" type="date" id="rp-end" value="'+State.cache.repFilter.end+'"></div>'
      +'<button class="btn btn-subtle btn-sm" id="rp-now">Bulan ini</button>'
      +'<button class="btn btn-subtle btn-sm" id="rp-h1">Tgl 1–15</button>'
      +'<button class="btn btn-subtle btn-sm" id="rp-h2">Tgl 16–akhir</button>'
      +'<button class="btn btn-ghost btn-sm" id="rp-csv">'+icon('download',15)+' Ekspor CSV</button>'
    +'</div></div></div>'
    +'<div id="rp-body"></div>';
  const draw=()=> drawReport(revs, exps, map, cats);
  ['rp-start','rp-end'].forEach(id=> $('#'+id).addEventListener('change', ()=>{ State.cache.repFilter={ start:$('#rp-start').value, end:$('#rp-end').value }; draw(); }));
  $('#rp-now').addEventListener('click', ()=>{ const d=monthRange(now.getFullYear(), now.getMonth()); setRep(d.start,d.end,draw); });
  $('#rp-h1').addEventListener('click', ()=>{ const d=halfRange(now.getFullYear(), now.getMonth(),1); setRep(d.start,d.end,draw); });
  $('#rp-h2').addEventListener('click', ()=>{ const d=halfRange(now.getFullYear(), now.getMonth(),2); setRep(d.start,d.end,draw); });
  $('#rp-csv').addEventListener('click', ()=> exportReportCSV(revs, exps, map));
  draw();
}
function setRep(s,e,draw){ State.cache.repFilter={start:s,end:e}; $('#rp-start').value=s; $('#rp-end').value=e; draw(); }
function drawReport(revs, exps, map, cats){
  const f=State.cache.repFilter;
  const E=exps.filter(e=>inRange(e.tanggal,f.start,f.end));
  const totExp=sum(E,e=>e.amount);
  const expByCat={}; E.forEach(e=>{ expByCat[e.kategori]=(expByCat[e.kategori]||0)+e.amount; });
  // SPV: laporan khusus pengeluaran (tanpa angka pendapatan)
  if(State.user.role==='spv'){
    $('#rp-body').innerHTML =
      '<div class="grid g-3 mb-lg">'
        + stat('Total pengeluaran','ic-neg','expense', rpShort(totExp), E.length+' transaksi')
        + stat('Rata-rata/transaksi','ic-sun','receipt', rp(E.length?Math.round(totExp/E.length):0), 'per pengeluaran')
        + stat('Periode','ic-pine','calendar', fmtDate(f.start), 's/d '+fmtDate(f.end))
      +'</div>'
      +'<div class="card mb-lg"><div class="card-head"><h3>Pengeluaran per kategori</h3><span class="pill">'+fmtDate(f.start)+' – '+fmtDate(f.end)+'</span></div><div class="card-pad">'+barChart(expByCat, totExp, 'neg')+'</div></div>'
      +'<div class="card"><div class="card-head"><h3>Rekap pengeluaran</h3></div><div class="table-wrap"><table class="tbl"><thead><tr><th>Kategori</th><th class="num">Nilai</th><th class="num">%</th></tr></thead><tbody>'
        + Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>'<tr><td>'+esc(k)+'</td><td class="num neg strong">−'+rp(v)+'</td><td class="num muted">'+(totExp?((v/totExp)*100).toFixed(1):0)+'%</td></tr>').join('')
      +'</tbody></table></div></div>';
    return;
  }
  const R=revs.filter(r=>inRange(r.tanggal,f.start,f.end));
  const totRev=sum(R,r=>r.amount), net=totRev-totExp;
  // per kategori pendapatan
  const revByCat={}; const tiketRev={}, videoRev={};
  R.forEach(r=>{ const cat=map[r.kategori_id]; const k=cat?cat.name:'Lainnya'; revByCat[k]=(revByCat[k]||0)+r.amount; if(cat&&cat.type==='video') videoRev[k]=(videoRev[k]||0)+r.amount; else tiketRev[k]=(tiketRev[k]||0)+r.amount; });
  // metode
  const tunai=sum(R.filter(r=>r.metode==='tunai'),r=>r.amount), qris=sum(R.filter(r=>r.metode==='qris'),r=>r.amount);
  const totTiket=sum(Object.values(tiketRev)), totVideo=sum(Object.values(videoRev));

  $('#rp-body').innerHTML =
    '<div class="grid g-4 mb-lg">'
      + stat('Total pendapatan','ic-pos','revenue', rpShort(totRev), R.length+' transaksi')
      + stat('Total pengeluaran','ic-neg','expense', rpShort(totExp), E.length+' transaksi')
      + stat('Laba kotor','ic-gold','report', rpShort(net), net>=0?'surplus':'defisit')
      + stat('Tunai / QRIS','ic-pine','wallet', rpShort(tunai)+' / '+rpShort(qris), 'komposisi bayar')
    +'</div>'
    +'<div class="grid g-2 mb-lg">'
      +'<div class="card"><div class="card-head"><h3>Pendapatan per kategori</h3><span class="pill">'+fmtDate(f.start)+' – '+fmtDate(f.end)+'</span></div><div class="card-pad">'+barChart(revByCat, totRev, 'pine')
        +'<div class="kpi-line big" style="margin-top:10px"><span class="k-l">Tiket</span><span class="k-v">'+rp(totTiket)+'</span></div><div class="kpi-line"><span class="k-l">Video</span><span class="k-v">'+rp(totVideo)+'</span></div></div></div>'
      +'<div class="card"><div class="card-head"><h3>Pengeluaran per kategori</h3></div><div class="card-pad">'+barChart(expByCat, totExp, 'neg')+'</div></div>'
    +'</div>'
    +'<div class="card"><div class="card-head"><h3>Rekap kategori</h3></div><div class="table-wrap"><table class="tbl"><thead><tr><th>Kategori</th><th>Jenis</th><th class="num">Nilai</th><th class="num">% dari total</th></tr></thead><tbody>'
      + Object.entries(revByCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{ const cat=cats.find(c=>c.name===k); const isV=cat&&cat.type==='video'; return '<tr><td>'+esc(k)+'</td><td><span class="badge '+(isV?'badge-video':'badge-tiket')+'">'+(isV?'Video':'Tiket')+'</span></td><td class="num pos strong">+'+rp(v)+'</td><td class="num muted">'+(totRev?((v/totRev)*100).toFixed(1):0)+'%</td></tr>'; }).join('')
      + Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>'<tr><td>'+esc(k)+'</td><td><span class="badge badge-grey">Pengeluaran</span></td><td class="num neg strong">−'+rp(v)+'</td><td class="num muted">'+(totExp?((v/totExp)*100).toFixed(1):0)+'%</td></tr>').join('')
    +'</tbody></table></div></div>';
}

function filterCard(prefix, cats){
  const f=State.cache[prefix+'Filter'];
  return '<div class="card"><div class="card-pad"><div class="filterbar">'
    +'<div class="field"><label class="label">Dari</label><input class="input" type="date" id="'+prefix+'f-start" value="'+f.start+'"></div>'
    +'<div class="field"><label class="label">Sampai</label><input class="input" type="date" id="'+prefix+'f-end" value="'+f.end+'"></div>'
    +'<div class="field"><label class="label">Kategori</label><select class="select" id="'+prefix+'f-kat"><option value="">Semua</option>'+cats.map(c=>'<option value="'+c.id+'" '+(f.kat===c.id?'selected':'')+'>'+esc(c.name)+'</option>').join('')+'</select></div>'
    +'<div class="field"><label class="label">Metode</label><select class="select" id="'+prefix+'f-metode"><option value="">Semua</option><option value="tunai" '+(f.metode==='tunai'?'selected':'')+'>Tunai</option><option value="qris" '+(f.metode==='qris'?'selected':'')+'>QRIS</option></select></div>'
    +'<button class="btn btn-subtle btn-sm" id="'+prefix+'f-now">Bulan ini</button>'
  +'</div></div></div>';
}
function bindFilter(prefix, cats, draw){
  const apply=()=>{ State.cache[prefix+'Filter']={ start:$('#'+prefix+'f-start').value, end:$('#'+prefix+'f-end').value, kat:$('#'+prefix+'f-kat').value, metode:$('#'+prefix+'f-metode').value }; draw(); };
  [prefix+'f-start',prefix+'f-end',prefix+'f-kat',prefix+'f-metode'].forEach(id=>{ const el=$('#'+id); if(el) el.addEventListener('change', apply); });
  const nb=$('#'+prefix+'f-now'); if(nb) nb.addEventListener('click', ()=>{ const d=monthRange(new Date().getFullYear(), new Date().getMonth()); $('#'+prefix+'f-start').value=d.start; $('#'+prefix+'f-end').value=d.end; apply(); });
}
function emptyState(ic,title,desc){ return '<div class="empty"><div class="e-ic">'+icon(ic,24)+'</div><h4>'+esc(title)+'</h4><p>'+esc(desc)+'</p></div>'; }

/* modal engine */
function openModal(opt){
  const root=$('#modal-root');
  root.innerHTML='<div class="modal-bg" id="modal-bg"><div class="modal'+(opt.wide?' wide':'')+'">'
    +'<div class="modal-head"><div><h3>'+esc(opt.title)+'</h3>'+(opt.sub?'<div class="mh-sub">'+esc(opt.sub)+'</div>':'')+'</div><button class="x-btn" id="modal-x">'+icon('close',18)+'</button></div>'
    +'<div class="modal-body">'+opt.body+'</div>'
    +'<div class="modal-foot">'+(opt.hideCancel?'':'<button class="btn btn-ghost" id="modal-cancel">Batal</button>')+'<button class="btn btn-primary" id="modal-ok" '+(opt.okDisabled?'disabled':'')+'>'+esc(opt.okText||'Simpan')+'</button></div>'
  +'</div></div>';
  const close=()=>{ root.innerHTML=''; };
  $('#modal-x').addEventListener('click', close);
  const cancel=$('#modal-cancel'); if(cancel) cancel.addEventListener('click', close);
  $('#modal-bg').addEventListener('click', e=>{ if(e.target.id==='modal-bg') close(); });
  $('#modal-ok').addEventListener('click', async ()=>{ const btn=$('#modal-ok'); btn.disabled=true; try{ const r=await opt.onOk(); if(r!==false) close(); else btn.disabled=false; }catch(ex){ console.error(ex); toast(ex.message||'Gagal menyimpan','err'); btn.disabled=false; } });
}
function confirmDelete(msg, fn, okText){
  openModal({ title:'Konfirmasi', body:'<p style="margin:0;color:var(--muted)">'+esc(msg)+'</p>', okText:okText||'Hapus',
    onOk: async ()=>{ await fn(); return true; } });
  const ok=$('#modal-ok'); if(ok && (!okText || okText==='Hapus')){ ok.classList.remove('btn-primary'); ok.style.background='var(--neg)'; }
}
function openImage(src){
  const root=$('#modal-root');
  root.innerHTML='<div class="modal-bg" id="img-bg" style="padding:30px"><div style="max-width:640px;width:100%"><div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="x-btn" id="img-x">'+icon('close',18)+'</button></div><img src="'+src+'" style="width:100%;border-radius:14px;box-shadow:var(--shadow-lg);background:#0d1f18"></div></div>';
  const close=()=>root.innerHTML='';
  $('#img-x').addEventListener('click', close);
  $('#img-bg').addEventListener('click', e=>{ if(e.target.id==='img-bg') close(); });
}

/* format ribuan saat mengetik */
function attachThousand(id){ const el=$('#'+id); if(!el) return; el.addEventListener('input', ()=>{ const v=num(el.value); el.value = v? new Intl.NumberFormat('id-ID').format(v): ''; }); if(el.value) el.value=new Intl.NumberFormat('id-ID').format(num(el.value)); }

/* ---------- ekspor CSV ---------- */
function downloadCSV(filename, rows){
  const csv = rows.map(r=> r.map(cell=>{ const s=String(cell==null?'':cell); return /[",\n;]/.test(s)? '"'+s.replace(/"/g,'""')+'"' : s; }).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url); toast('CSV diunduh','ok');
}
function exportRevCSV(list, map){ const rows=[['Tanggal','Kategori','Jenis','Metode','Qty','Nominal','Oleh','Catatan']]; list.forEach(r=>{ const c=map[r.kategori_id]; rows.push([r.tanggal, c?c.name:'', c?c.type:'', r.metode, r.qty||'', r.amount, r.created_by_name||'', r.catatan||'']); }); downloadCSV('pendapatan.csv', rows); }
function exportExpCSV(list){ const rows=[['Tanggal','Kategori','Deskripsi','Oleh','Nominal']]; list.forEach(e=> rows.push([e.tanggal, e.kategori, e.deskripsi||'', e.created_by_name||'', e.amount])); downloadCSV('pengeluaran.csv', rows); }
function exportAsetCSV(list){ const rows=[['Nama','Kategori','Lokasi','Kondisi','Jumlah','Nilai/unit','Total','Tanggal beli','Catatan']]; list.forEach(a=> rows.push([a.nama,a.kategori||'',a.lokasi||'',a.kondisi||'',a.jumlah||1,a.nilai||0,(a.nilai||0)*(a.jumlah||1),a.tanggal_beli||'',a.catatan||''])); downloadCSV('aset.csv', rows); }
function exportReportCSV(revs, exps, map){ const f=State.cache.repFilter; const rows=[['Laporan periode',f.start,'s/d',f.end],[],['PENDAPATAN'],['Tanggal','Kategori','Jenis','Metode','Qty','Nominal']];
  revs.filter(r=>inRange(r.tanggal,f.start,f.end)).forEach(r=>{ const c=map[r.kategori_id]; rows.push([r.tanggal,c?c.name:'',c?c.type:'',r.metode,r.qty||'',r.amount]); });
  rows.push([],['PENGELUARAN'],['Tanggal','Kategori','Deskripsi','Nominal']);
  exps.filter(e=>inRange(e.tanggal,f.start,f.end)).forEach(e=> rows.push([e.tanggal,e.kategori,e.deskripsi||'',e.amount]));
  downloadCSV('laporan_'+f.start+'_'+f.end+'.csv', rows);
}
